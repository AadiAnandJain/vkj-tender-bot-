name: VKJ Tender Discovery Bot

on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 6 * * *"
    - cron: "30 9 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  discover-tenders:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run VKJ Tender Bot
        run: python scraper.py

      - name: Done
        run: echo "Bot completed at $(date)"
